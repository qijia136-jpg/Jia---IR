<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式 DTP/医院节点监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fb;
            color: #2f3e55;
            min-height: 100%;
        }
        body {
            padding: 20px;
        }
        .page {
            max-width: 1200px;
            margin: 0 auto;
        }
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 2.4rem;
            color: #1a73e8;
            margin-bottom: 10px;
        }
        .page-header p {
            color: #556073;
            font-size: 1rem;
        }
        .panel {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 14px 30px rgba(20, 40, 80, 0.08);
            padding: 24px;
        }
        .card h2 {
            font-size: 1.4rem;
            color: #1a73e8;
            margin-bottom: 16px;
        }
        .radio-group,
        .search-group,
        .node-list {
            margin-bottom: 24px;
        }
        .radio-group label {
            display: block;
            margin-bottom: 12px;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #d9e4f5;
            background: #f8fbff;
            transition: all 0.25s ease;
        }
        .radio-group input {
            margin-right: 10px;
        }
        .radio-group input:checked + span {
            color: #0f4db1;
            font-weight: 700;
        }
        .search-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d9e4f5;
            font-size: 1rem;
            background: #f8fbff;
            color: #2f3e55;
        }
        .facility-group {
            margin-bottom: 24px;
        }
        .facility-group select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d9e4f5;
            background: #f8fbff;
            color: #2f3e55;
            font-size: 1rem;
        }
        .facility-status {
            margin-bottom: 24px;
            padding: 18px 20px;
            border-radius: 16px;
            background: #edf7ee;
            border: 1px solid #c8e3cd;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
        }
        .facility-status h4 {
            margin: 0;
            color: #1f6d33;
            font-size: 1.1rem;
        }
        .facility-status p {
            margin: 0;
            color: #234d2f;
            font-size: 0.95rem;
        }
        .facility-checks {
            margin-top: 14px;
            padding: 16px;
            border-radius: 14px;
            background: #f4fbf4;
            border: 1px solid #d6ead7;
        }
        .facility-checks h4 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: #1f6d33;
        }
        .facility-checks li {
            margin-bottom: 8px;
            color: #2e4f39;
            line-height: 1.6;
        }
        .facility-pill {
            padding: 10px 16px;
            border-radius: 999px;
            font-weight: 700;
            color: #1f6d33;
            background: #c7ebc4;
        }
        .overview-section {
            margin-bottom: 24px;
        }
        .overview-section h2 {
            margin-bottom: 14px;
        }
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: 12px;
        }
        .overview-item {
            background: #eef4ff;
            border: 1px solid #d9e4f5;
            border-radius: 14px;
            padding: 14px 16px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        .overview-item:hover,
        .overview-item.active {
            background: #d8e7ff;
            transform: translateX(2px);
        }
        .overview-item h3 {
            font-size: 1rem;
            margin-bottom: 6px;
            color: #16418f;
        }
        .overview-item p {
            font-size: 0.92rem;
            color: #4b5f7b;
            line-height: 1.5;
        }
        .node-list button {
            width: 100%;
            text-align: left;
            background: #eef4ff;
            border: 1px solid #d9e4f5;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
            cursor: pointer;
            color: #2f3e55;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        .node-list button:hover,
        .node-list button.active {
            background: #d8e7ff;
            transform: translateX(2px);
        }
        .node-detail {
            background: #f8fbff;
            border: 1px solid #d9e4f5;
            border-radius: 16px;
            padding: 24px;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .node-detail h3 {
            font-size: 1.5rem;
            color: #173d94;
            margin-bottom: 18px;
        }
        .node-detail section {
            margin-bottom: 20px;
        }
        .node-detail section:last-child {
            margin-bottom: 0;
        }
        .node-detail section h4 {
            font-size: 1.05rem;
            margin-bottom: 10px;
            color: #1a4ba8;
        }
        .node-detail section p,
        .node-detail section ul {
            color: #3e4f6a;
            line-height: 1.75;
        }
        .node-detail section ul {
            margin-left: 20px;
            list-style-type: disc;
        }
        .note {
            font-size: 0.95rem;
            color: #6a788f;
            border-top: 1px solid #d9e4f5;
            padding-top: 16px;
            margin-top: 20px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .tag {
            padding: 6px 12px;
            border-radius: 999px;
            background: #e9f1ff;
            color: #1a73e8;
            font-size: 0.9rem;
        }
        .status-box {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 20px;
            margin-bottom: 24px;
            border-radius: 16px;
            border: 1px solid #d3e8d7;
            background: #edf7ee;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 80px;
            padding: 10px 14px;
            border-radius: 999px;
            font-weight: 700;
            color: #1f6d33;
            background: #c7ebc4;
        }
        .status-box p {
            margin: 0;
            color: #234d2f;
            line-height: 1.6;
        }
        .empty-state {
            color: #5f6c86;
            font-size: 1rem;
            margin-top: 40px;
            text-align: center;
        }
        @media (max-width: 1024px) {
            .panel {
                grid-template-columns: 1fr;
            }
            .node-detail {
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="page-header">
            <h1>监管视角：DTP 药房与医院节点合规监控</h1>
            <p>从监管部门的角度审视 DTP 药房和医院在授权、质量、冷链、变更和风险升级上的合规状态。</p>
            <p style="margin-top: 12px; color: #43556b; font-size: 0.98rem;">页面展示监管入口、机构授权状态、监控节点总览与节点合规详情，便于审计、审核和持续监管。</p>
        </div>

        <div class="panel">
            <div class="card">
                <div class="facility-group">
                    <h2>机构选择</h2>
                    <select id="facilitySelect"></select>

                    <h2>监管入口选择</h2>

                    <label><input type="radio" name="entry" value="hospital"><span>医院监管</span></label>
                </div>

                <div class="search-group">
                    <h2>节点查询</h2>
                    <input id="searchInput" type="text" placeholder="输入节点名称或关键词搜索...">
                </div>

                <div class="overview-section">
                    <h2>监控节点总览</h2>
                    <p style="color: #4f637d; font-size: 0.95rem; margin-bottom: 14px; line-height: 1.6;">展示每个机构在监管重点节点的实时合规监控方向。选择节点后，可查看监管要求、合规状态与变更升级策略。</p>
                    <div class="overview-grid" id="overviewList">
                        <!-- 监控节点总览由脚本渲染 -->
                    </div>
                </div>

                <div class="node-list" id="nodeList">
                    <!-- 节点按钮将由脚本渲染 -->
                </div>
            </div>

            <div class="card node-detail" id="detailPanel">
                <div id="facilityStatus"></div>
                <div id="detailContent">
                    <h3>请选择左侧节点查看监管详情</h3>
                    <p>页面将展示每个节点的监管合规点、检查标准、已授权状态及持续监管建议，支持审计与风险评估。</p>
                </div>
            </div>
        </div>
    </div>

        function renderFacilityStatus() {
            const facility = facilities[currentEntry][facilitySelect.value || 0];
            const statusText = facility.status === '已授权' ? '授权状态：已授权（合格）' : `授权状态：${facility.status}`;
            facilityStatus.innerHTML = `
                <div>
                    <h4>${facility.name}</h4>
                    <p>${facility.description}</p>
                    <div class="facility-checks">
                        <h4>监管检查节点</h4>
                        <ul>${facility.checks.map(check => `<li>${check}</li>`).join('')}</ul>
                    </div>
                </div>
                <div class="facility-pill">${statusText}</div>
            `;
        }

        facilitySelect.addEventListener('change', renderFacilityStatus);

        function renderNodeList() {
            const entryData = data[currentEntry];
            const filterText = searchInput.value.trim().toLowerCase();
            nodeList.innerHTML = '';
            const filtered = entryData.nodes.filter((node) => {
                return node.title.toLowerCase().includes(filterText) || node.monitoring.join(' ').toLowerCase().includes(filterText) || node.change.join(' ').toLowerCase().includes(filterText);
            });

            if (!filtered.length) {
                overviewList.innerHTML = '<p class="empty-state">当前入口暂无监控节点匹配，请尝试更换关键词。</p>';
                nodeList.innerHTML = '<p class="empty-state">未找到匹配节点，请尝试更换关键词或入口。</p>';
                detailContent.innerHTML = '<h3>请选择左侧节点查看详情</h3><p>当前没有匹配结果。</p>';
                return;
            }

            renderOverview(filtered);
            filtered.forEach((node, index) => {
                const button = document.createElement('button');
                button.textContent = node.title;
                button.className = index === activeNodeIndex ? 'active' : '';
                button.addEventListener('click', () => {
                    activeNodeIndex = index;
                    renderDetail(node);
                    renderNodeList();
                });
                nodeList.appendChild(button);
            });

            if (activeNodeIndex === null || activeNodeIndex >= filtered.length) {
                activeNodeIndex = 0;
                renderDetail(filtered[0]);
                const firstButton = nodeList.querySelector('button');
                if (firstButton) {
                    firstButton.classList.add('active');
                }
            }
        }

        function renderOverview(filtered) {
            overviewList.innerHTML = '';
            filtered.forEach((node, index) => {
                const item = document.createElement('div');
                item.className = index === activeNodeIndex ? 'overview-item active' : 'overview-item';
                item.innerHTML = `
                    <h3>${node.title}</h3>
                    <p>${node.monitoring[0] || ''}</p>
                `;
                item.addEventListener('click', () => {
                    activeNodeIndex = index;
                    renderDetail(node);
                    renderNodeList();
                });
                overviewList.appendChild(item);
            });
        }

        function renderDetail(node) {
            const regulatoryText = node.regulatory || '依据 GMP/GSP 要求，重点监管该节点的授权、记录、温控、变更闭环和持续追踪。';
            const tagsHtml = node.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            const qualified = node.qualified !== false;
            detailContent.innerHTML = `
                <div class="status-box">
                    <span class="status-pill">${qualified ? '合格' : '待审'}</span>
                    <p>${qualified ? '该监管节点已通过检查，授权成功，可进入下一阶段管理环节。' : '该节点当前为待审状态，需补充资料或进一步审核。'}</p>
                </div>
                <h3>${node.title}</h3>
                <section>
                    <h4>监管要点</h4>
                    <p>${regulatoryText}</p>
                </section>
                <section>
                    <h4>监控方式</h4>
                    <ul>${node.monitoring.map(item => `<li>${item}</li>`).join('')}</ul>
                </section>
                <section>
                    <h4>变更与升级建议</h4>
                    <ul>${node.change.map(item => `<li>${item}</li>`).join('')}</ul>
                </section>
                <section>
                    <h4>责任部门</h4>
                    <p>${node.owner}</p>
                </section>
                <div class="note">
                    <strong>入口：</strong>${data[currentEntry].title}  |  <strong>标签：</strong>
                    <span class="tags">${tagsHtml}</span>
                </div>
            `;
        }

        function updateEntry() {
            currentEntry = document.querySelector('input[name="entry"]:checked').value;
            activeNodeIndex = null;
            searchInput.value = '';
            renderFacilityOptions();
            renderNodeList();
        }

        entryInputs.forEach((input) => {
            input.addEventListener('change', updateEntry);
        });

        searchInput.addEventListener('input', () => {
            activeNodeIndex = null;
            renderNodeList();
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderFacilityOptions();
            renderNodeList();
        });
    </script>
</body>
</html>
